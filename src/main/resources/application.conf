quack-on-demand {
  host = "0.0.0.0"
  host = ${?SL_QUACK_ON_DEMAND_HOST}
  port = 20900
  port = ${?SL_QUACK_ON_DEMAND_PORT}
  apiKey = ${?SL_QUACK_API_KEY}

  runtimeType = "local"
  runtimeType = ${?SL_QUACK_RUNTIME_TYPE}

  minPort = 21900
  minPort = ${?SL_QUACK_MIN_PORT}
  maxPort = 22500
  maxPort = ${?SL_QUACK_MAX_PORT}
  maxNodesTotal = 50
  maxNodesTotal = ${?SL_QUACK_MAX_NODES_TOTAL}

  statePath = "./state/quack-on-demand-state.json"
  statePath = ${?SL_QUACK_STATE_PATH}

  # Where to persist tenant + pool definitions. Either:
  #   "postgres" - single-row JSONB table `slkstate_pool_state` in the same
  #                Postgres database as defaultMetastore (pgHost/pgPort/pgUser
  #                /pgPassword/dbName). All control-plane tables use the
  #                `slkstate_` prefix so they coexist with DuckLake's
  #                `__ducklake_*` tables. Manager + multiple readers see the
  #                same state; survives container restarts without a volume.
  #                (Default - DuckLake already requires Postgres, so reusing
  #                that connection avoids an extra moving part.)
  #   "file"     - JSON blob at statePath. Use when there is no Postgres
  #                (i.e. running quack-on-demand without DuckLake).
  stateStorage = "postgres"
  stateStorage = ${?SL_QUACK_STATE_STORAGE}

  drainTimeoutSec = 60
  drainTimeoutSec = ${?SL_QUACK_DRAIN_TIMEOUT_SEC}
  healthCheckIntervalSec = 5
  healthCheckIntervalSec = ${?SL_QUACK_HEALTH_CHECK_INTERVAL_SEC}

  # Bootstrap admin user seeded into `slkstate_user` on startup (idempotent).
  # The row is created on every boot, password re-hashed via bcrypt so changing
  # the env var + restart is sufficient to rotate. Used by `auth.database` -
  # other backends ignore this. Set a strong password before exposing the edge.
  admin {
    username = "admin@localhost.local,admin"
    username = ${?SL_QUACK_ADMIN_USERNAME}
    password = "admin"
    password = ${?SL_QUACK_ADMIN_PASSWORD}
    role     = "admin"
    role     = ${?SL_QUACK_ADMIN_ROLE}
  }

  # Default metastore key/value pairs propagated to every spawned Quack node
  # as environment variables. CreatePoolRequest.metastore entries override
  # these per-pool. Key names match the spawn-quack-node.sh contract.
  #
  # Each field accepts a matching SL_QUACK_PG_* env var so the whole stack
  # (metastore + state store + auth DB lookup) can be redirected at one
  # Postgres instance from the environment without editing config.
  defaultMetastore {
    pgHost     = "localhost"
    pgHost     = ${?SL_QUACK_PG_HOST}
    pgPort     = "5432"
    pgPort     = ${?SL_QUACK_PG_PORT}
    pgUser     = "postgres"
    pgUser     = ${?SL_QUACK_PG_USER}
    pgPassword = "azizam"
    pgPassword = ${?SL_QUACK_PG_PASSWORD}
    dbName     = "tpch"
    dbName     = ${?SL_QUACK_PG_DBNAME}
    schemaName = "main"
    schemaName = ${?SL_QUACK_PG_SCHEMA}
    dataPath   = "/Users/hayssams/git/public/quack-on-demand/ducklake/tpch"
    dataPath   = ${?SL_QUACK_DUCKLAKE_DATA_PATH}
  }

  k8s {
    namespace = "default"
    namespace = ${?SL_QUACK_K8S_NAMESPACE}
    image = "starlakeai/quack:latest"
    image = ${?SL_QUACK_K8S_IMAGE}
    serviceAccount = ${?SL_QUACK_K8S_SERVICE_ACCOUNT}
    serviceType = "ClusterIP"
    serviceType = ${?SL_QUACK_K8S_SERVICE_TYPE}
    quackPort = 8080
    quackPort = ${?SL_QUACK_K8S_QUACK_PORT}
    startupTimeoutSec = 120
    startupTimeoutSec = ${?SL_QUACK_K8S_STARTUP_TIMEOUT_SEC}
    podLabel = "managed-by=quack-on-demand"
    podLabel = ${?SL_QUACK_K8S_POD_LABEL}
  }

  # Auto-create a starter tenant + pool on every boot. Idempotent: if the
  # tenant or pool already exists (by name) the create is skipped, so this
  # is safe to leave on across restarts. Disable by setting enabled=false
  # (or `SL_QUACK_BOOTSTRAP_ENABLED=false`) when running with externally
  # managed tenants.
  bootstrap {
    enabled = true
    enabled = ${?SL_QUACK_BOOTSTRAP_ENABLED}

    tenant = "acme"
    tenant = ${?SL_QUACK_BOOTSTRAP_TENANT}
    pool   = "sales"
    pool   = ${?SL_QUACK_BOOTSTRAP_POOL}

    # Role distribution for the bootstrap pool. Must sum to a positive
    # number of nodes; defaults to 1 WriteOnly + 1 ReadOnly + 1 Dual.
    roleDistribution {
      writeonly = 1
      writeonly = ${?SL_QUACK_BOOTSTRAP_WRITEONLY}
      readonly  = 1
      readonly  = ${?SL_QUACK_BOOTSTRAP_READONLY}
      dual      = 1
      dual      = ${?SL_QUACK_BOOTSTRAP_DUAL}
    }
  }

  metrics {
    enabled = true
    enabled = ${?SL_QUACK_METRICS_ENABLED}

    prometheus {
      enabled = true
      enabled = ${?SL_QUACK_METRICS_PROMETHEUS_ENABLED}
    }

    commonTags {
      deployment = ${?SL_QUACK_METRICS_DEPLOYMENT}
      region     = ${?SL_QUACK_METRICS_REGION}
    }

    gcp {
      enabled = false
      enabled = ${?SL_QUACK_METRICS_GCP_ENABLED}
      projectId = ${?SL_QUACK_METRICS_GCP_PROJECT_ID}
      stepSeconds = 60
      stepSeconds = ${?SL_QUACK_METRICS_GCP_STEP_SEC}
    }

    azure {
      enabled = false
      enabled = ${?SL_QUACK_METRICS_AZURE_ENABLED}
      instrumentationKey = ${?SL_QUACK_METRICS_AZURE_KEY}
      stepSeconds = 60
      stepSeconds = ${?SL_QUACK_METRICS_AZURE_STEP_SEC}
    }

    aws {
      enabled = false
      enabled = ${?SL_QUACK_METRICS_AWS_ENABLED}
      namespace = "quack-on-demand"
      namespace = ${?SL_QUACK_METRICS_AWS_NAMESPACE}
      stepSeconds = 60
      stepSeconds = ${?SL_QUACK_METRICS_AWS_STEP_SEC}
    }
  }
}

quack-flightsql {
  host = "0.0.0.0"
  host = ${?PROXY_HOST}
  port = 31338
  port = ${?PROXY_PORT}

  tlsEnabled = true
  tlsEnabled = ${?PROXY_TLS_ENABLED}
  tlsCertChain = "certs/server-cert.pem"
  tlsCertChain = ${?PROXY_TLS_CERT_CHAIN}
  tlsPrivateKey = "certs/server-key.pem"
  tlsPrivateKey = ${?PROXY_TLS_PRIVATE_KEY}

  # JWT claim that carries the tenant identifier for FlightSQL routing.
  # Mirrored under auth.tenantClaim for the vendored auth providers.
  tenantClaim = "tenant"
  tenantClaim = ${?PROXY_TENANT_CLAIM}

  # Defaults applied when the username/JWT does not specify a tenant or pool.
  # Match the bootstrap defaults under `quack-on-demand.bootstrap` so an
  # out-of-the-box client lands on the auto-created tenant/pool.
  defaultTenant = "acme"
  defaultTenant = ${?SL_QUACK_DEFAULT_TENANT}
  defaultPool = "sales"
  defaultPool = ${?SL_QUACK_DEFAULT_POOL}

  # Edge session TTL in seconds. After a handshake validates a Basic /
  # external Bearer credential, the resulting peerId is cached in
  # ConnectionContext. Past this TTL the next Flight RPC forces a fresh
  # handshake - re-validating against the providers. Bounds the
  # "revoked credential still works" window. Default 1 hour.
  sessionTtlSec = 3600
  sessionTtlSec = ${?SL_QUACK_SESSION_TTL_SEC}

  # Pluggable authentication for the FlightSQL edge. `database` is enabled
  # by default - the manager seeds slkstate_user with the configured admin
  # at startup so the edge has at least one valid credential out of the box.
  # JWT / OIDC providers (jwt, keycloak, google, azure, aws) default OFF;
  # flip the one(s) you want on. Disabling all backends falls back to the
  # v1 "trust the client" behavior - fine for local dev, never for prod.
  auth {
    roleClaim = "role"
    roleClaim = ${?SL_QUACK_AUTH_ROLE_CLAIM}

    # username + bcrypt-hashed password lookup against any JDBC-reachable
    # database. Defaults to the same Postgres instance as defaultMetastore;
    # override SL_QUACK_AUTH_DB_* to point elsewhere. `query` is a free-form
    # SQL template: it MUST return two columns (password_hash, role) and use
    # `?` as the username placeholder. Customize for your schema.
    database {
      # On by default - the manager seeds the admin user (slkstate_user)
      # at startup so out-of-the-box `admin / admin` works. Rotate via
      # SL_QUACK_ADMIN_PASSWORD before going to production. Flip the env
      # var to "false" to disable DB auth entirely (e.g. local-only dev
      # behind a separate proxy).
      enabled  = true
      enabled  = ${?SL_QUACK_AUTH_DB_ENABLED}
      jdbcUrl  = "jdbc:postgresql://"${quack-on-demand.defaultMetastore.pgHost}":"${quack-on-demand.defaultMetastore.pgPort}"/"${quack-on-demand.defaultMetastore.dbName}
      jdbcUrl  = ${?SL_QUACK_AUTH_DB_JDBC_URL}
      username = ${quack-on-demand.defaultMetastore.pgUser}
      username = ${?SL_QUACK_AUTH_DB_USER}
      password = ${quack-on-demand.defaultMetastore.pgPassword}
      password = ${?SL_QUACK_AUTH_DB_PASSWORD}
      query    = "SELECT password_hash, role FROM slkstate_user WHERE username = ?"
      query    = ${?SL_QUACK_AUTH_DB_QUERY}
    }

    # External JWT issuers (custom signing key, not OIDC). Either secretKey
    # (HS256/HS512) or publicKeyPath (RSA/ECDSA PEM). Both empty disables;
    # presence of either turns the bearer provider on.
    jwt {
      secretKey     = ""
      secretKey     = ${?JWT_SECRET_KEY}
      publicKeyPath = ""
      publicKeyPath = ${?JWT_PUBLIC_KEY_PATH}
      issuer        = ""
      issuer        = ${?JWT_ISSUER}
      audience      = ""
      audience      = ${?JWT_AUDIENCE}
    }

    # OIDC providers (JWKS-validated bearer tokens; Keycloak supports ROPC).
    keycloak {
      enabled      = false
      enabled      = ${?SL_QUACK_AUTH_KEYCLOAK_ENABLED}
      baseUrl      = "https://keycloak.example.com"
      baseUrl      = ${?SL_QUACK_AUTH_KEYCLOAK_BASE_URL}
      realm        = "quack"
      realm        = ${?SL_QUACK_AUTH_KEYCLOAK_REALM}
      clientId     = ""
      clientId     = ${?SL_QUACK_AUTH_KEYCLOAK_CLIENT_ID}
      clientSecret = ""
      clientSecret = ${?SL_QUACK_AUTH_KEYCLOAK_CLIENT_SECRET}
    }
    google {
      enabled               = false
      enabled               = ${?SL_QUACK_AUTH_GOOGLE_ENABLED}
      clientId              = ""
      clientId              = ${?SL_QUACK_AUTH_GOOGLE_CLIENT_ID}
      clientSecret          = ""
      clientSecret          = ${?SL_QUACK_AUTH_GOOGLE_CLIENT_SECRET}
      groupsLookup          = false
      groupsLookup          = ${?SL_QUACK_AUTH_GOOGLE_GROUPS_LOOKUP}
      serviceAccountKeyPath = ""
      serviceAccountKeyPath = ${?SL_QUACK_AUTH_GOOGLE_SVC_ACCT_KEY_PATH}
      groupsCacheTtlSeconds = 300
      groupsCacheTtlSeconds = ${?SL_QUACK_AUTH_GOOGLE_GROUPS_CACHE_TTL_SEC}
    }
    azure {
      enabled      = false
      enabled      = ${?SL_QUACK_AUTH_AZURE_ENABLED}
      tenantId     = ""
      tenantId     = ${?SL_QUACK_AUTH_AZURE_TENANT_ID}
      clientId     = ""
      clientId     = ${?SL_QUACK_AUTH_AZURE_CLIENT_ID}
      clientSecret = ""
      clientSecret = ${?SL_QUACK_AUTH_AZURE_CLIENT_SECRET}
    }
    aws {
      enabled    = false
      enabled    = ${?SL_QUACK_AUTH_AWS_ENABLED}
      region     = "us-east-1"
      region     = ${?SL_QUACK_AUTH_AWS_REGION}
      userPoolId = ""
      userPoolId = ${?SL_QUACK_AUTH_AWS_USER_POOL_ID}
      clientId   = ""
      clientId   = ${?SL_QUACK_AUTH_AWS_CLIENT_ID}
    }

    # Browser-based OAuth flow (auth code grant); off by default since the
    # FlightSQL JDBC driver does the handshake via Basic/Bearer headers.
    oauth {
      enabled               = false
      enabled               = ${?SL_QUACK_AUTH_OAUTH_ENABLED}
      port                  = 8888
      port                  = ${?SL_QUACK_AUTH_OAUTH_PORT}
      baseUrl               = "http://localhost:8888"
      baseUrl               = ${?SL_QUACK_AUTH_OAUTH_BASE_URL}
      scopes                = "openid profile email"
      scopes                = ${?SL_QUACK_AUTH_OAUTH_SCOPES}
      sessionTimeoutSeconds = 3600
      sessionTimeoutSeconds = ${?SL_QUACK_AUTH_OAUTH_SESSION_TIMEOUT_SEC}
      disableTls            = false
      disableTls            = ${?SL_QUACK_AUTH_OAUTH_DISABLE_TLS}
    }
  }
  validation {
    enabled = true
    enabled = ${?SL_QUACK_VALIDATION_ENABLED}
    allowByDefault = true
    allowByDefault = ${?SL_QUACK_VALIDATION_ALLOW_BY_DEFAULT}
    # Comma-separated list of usernames that skip SQL validation entirely.
    bypassUsers = "admin@localhost.local,admin"
    bypassUsers = ${?SL_QUACK_VALIDATION_BYPASS_USERS}
  }
  # Table-level access control. When enabled, every SQL statement runs
  # through the vendored AclStatementValidator: it parses the SQL, extracts
  # table refs, and checks each against grants stored under `base-path/<tenant>/`.
  # Grants are YAML/JSON files keyed by username/group; see
  # ai.starlake.acl.store.AclStoreFactory for the layout.
  #
  # When the base-path doesn't exist on disk (and isn't s3://, gs://, az://),
  # the validator allows everything - so you can flip `enabled=true` ahead of
  # populating grants without locking yourself out.
  #
  # NOTE: AclConfig is read with explicit kebab-case keys (its ConfigReader
  # is hand-rolled to avoid pureconfig mangling "s3" into "s-3"). Keep the
  # keys as-is below - camelCase will NOT be read.
  acl {
    enabled       = false
    enabled       = ${?SL_QUACK_ACL_ENABLED}
    base-path     = "/etc/quack-on-demand/acl"
    base-path     = ${?SL_QUACK_ACL_BASE_PATH}
    # Statement parser dialect. Use "duckdb" for our edge.
    dialect       = "duckdb"
    dialect       = ${?SL_QUACK_ACL_DIALECT}
    # JWT/auth claim name carrying the user's group memberships. ACL falls
    # back to a single-element group derived from the "role" claim otherwise.
    groups-claim  = "groups"
    groups-claim  = ${?SL_QUACK_ACL_GROUPS_CLAIM}
    # Upper bound on cached tenants in TenantCache.
    max-tenants   = 64
    max-tenants   = ${?SL_QUACK_ACL_MAX_TENANTS}
    watcher {
      enabled          = true
      debounce-ms      = 200
      max-backoff-ms   = 30000
      poll-interval-ms = 2000
    }
    s3 {
      region           = ${?AWS_REGION}
      credentials-file = ${?AWS_SHARED_CREDENTIALS_FILE}
    }
    gcs {
      project-id                = ${?GCP_PROJECT_ID}
      service-account-key-file  = ${?GOOGLE_APPLICATION_CREDENTIALS}
    }
    azure {
      connection-string = ${?AZURE_STORAGE_CONNECTION_STRING}
    }
  }
}