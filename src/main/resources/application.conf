quack-on-demand {
  host = "0.0.0.0"
  host = ${?QOD_ON_DEMAND_HOST}
  port = 20900
  port = ${?QOD_ON_DEMAND_PORT}
  apiKey = ${?QOD_API_KEY}

  runtimeType = "local"
  runtimeType = ${?QOD_RUNTIME_TYPE}

  minPort = 21900
  minPort = ${?QOD_MIN_PORT}
  maxPort = 22500
  maxPort = ${?QOD_MAX_PORT}
  maxNodesTotal = 50
  maxNodesTotal = ${?QOD_MAX_NODES_TOTAL}

  # First-keyword classifier used by the routing layer to pick a Quack
  # node role (READONLY / WRITEONLY / DUAL). Each entry is a
  # comma-separated keyword list; matching is case-insensitive.
  # Operators add dialect-specific verbs (e.g. DuckDB's `PRAGMA`,
  # `LOAD`, `INSTALL`) by extending the appropriate list -- values
  # REPLACE the built-in defaults, so copy the default + append.
  # Anything not classified by these lists falls through to
  # `StatementKind.Other`, which `RoleMatcher` routes like a read.
  statementClassifier {
    # Read-side verbs. WITH covers CTE-prefixed selects; FROM covers
    # DuckDB / BigQuery FROM-first shorthand; EXPLAIN is read-side by
    # convention even when explaining a write.
    select   = "SELECT,WITH,VALUES,SHOW,DESCRIBE,EXPLAIN,FROM"
    select   = ${?QOD_CLASSIFIER_SELECT}
    # Write-side verbs. COPY is DuckDB's data-load / export. UPSERT
    # and REPLACE are dialect variants of INSERT-with-conflict.
    dml      = "INSERT,UPDATE,DELETE,MERGE,UPSERT,REPLACE,COPY"
    dml      = ${?QOD_CLASSIFIER_DML}
    # Schema-mutating. ATTACH / DETACH are DuckDB catalog manipulation;
    # COMMENT ON is metadata DDL; GRANT / REVOKE mutate ACL state.
    ddl      = "CREATE,DROP,ALTER,TRUNCATE,ATTACH,DETACH,COMMENT,GRANT,REVOKE"
    ddl      = ${?QOD_CLASSIFIER_DDL}
    # Transaction control. START is the ANSI alias for BEGIN.
    begin    = "BEGIN,START"
    begin    = ${?QOD_CLASSIFIER_BEGIN}
    # END is the Postgres alias for COMMIT.
    commit   = "COMMIT,END"
    commit   = ${?QOD_CLASSIFIER_COMMIT}
    # ABORT is the Postgres alias for ROLLBACK.
    rollback = "ROLLBACK,ABORT"
    rollback = ${?QOD_CLASSIFIER_ROLLBACK}
  }

  # Column-level security.
  # `enabled` is the kill switch, on by default. Set false to opt out: every
  # statement then bypasses the rewriter entirely - no catalog lookup, no
  # jsqltranspiler call, no per-statement overhead. Known limitations
  # (federated sources, LateralSubSelect/TableFunction FROM items, the
  # 5-second catalog cache TTL race) are documented at
  # website/docs/operating/rbac-model.md.
  # `unresolvedTable` decides what happens when the DuckLake catalog cannot
  # enumerate a referenced table (typo, federated alias the rewriter doesn't
  # know about, or a metadata race). Default: "pass" - fall back to the
  # unrewritten SQL (the v1 behavior). Set to "deny" for the safer posture
  # that rejects the statement instead. Ignored when `enabled = false`.
  cls {
    enabled = true
    enabled = ${?QOD_CLS_ENABLED}
    unresolvedTable = "pass"
    unresolvedTable = ${?QOD_CLS_UNRESOLVED_TABLE}
  }

  # Row-level security.
  # `enabled` is the kill switch, on by default. Set false to opt out: every
  # statement then bypasses the row-policy rewriter - no parse, no table
  # wrapping, no per-statement overhead. When on, each base table a
  # SELECT touches that carries a matching qodstate_role_row_policy for the
  # principal is replaced by `(SELECT * FROM <table> WHERE <predicate>)`;
  # predicates from the principal's several roles combine with OR (permissive
  # union). Superusers (tenant IS NULL) are never filtered. Unparseable SQL
  # falls through unrewritten (tagged parse_failed on row_policy_rewrites_total).
  rls {
    enabled = true
    enabled = ${?QOD_RLS_ENABLED}
  }

  # Toggle the JNI-backed native Quack wire client in QuackHttpClient.
  # Default: true (the JNI native path is the production-grade default).
  # Set QOD_NATIVE_CLIENT=false (or change
  # the HOCON below) to opt back into the embedded-DuckDB + `quack` extension
  # path; that path is wrapped in a JVM-wide mutex (one in-flight quack_query
  # per manager) to neutralise the upstream process-wide state race, so it is
  # correct but throughput-capped -- scale managers horizontally if you must
  # stay on the embedded path under sustained load.
  nativeClient = true
  nativeClient = ${?QOD_NATIVE_CLIENT}

  # EPIC P1: stamp DuckLake snapshots created via FlightSQL DML/DDL with
  # author = tenant:<tenant>/user:<user> and a system commit message
  # (three-PREPARE bracket on the native wire; fail-open, so a stamping
  # failure never blocks the write). Native client path only.
  stampWrites = true
  stampWrites = ${?QOD_STAMP_WRITES}

  # disable_ssl flag forwarded to the embedded-path `quack_query(...)` call.
  # Default true to match `spawn-quack-node.sh`, which starts quack_serve
  # over plain HTTP. Operators fronting nodes with TLS (service mesh mTLS
  # or app-level certs added to the spawn script) should set
  # QOD_NODE_DISABLE_SSL=false. Ignored on the native path.
  nodeDisableSsl = true
  nodeDisableSsl = ${?QOD_NODE_DISABLE_SSL}

  # Path to the script LocalQuackBackend invokes to spawn a child Quack
  # node (DuckDB + DuckLake attach + quack_serve). Override with
  # QOD_SPAWN_SCRIPT when the binary lives outside the repo (e.g. a
  # container image installs it under /opt/...).
  spawnScript = "./scripts/spawn-quack-node.sh"
  spawnScript = ${?QOD_SPAWN_SCRIPT}

  # PowerShell mirror of spawnScript, used when the manager runs on Windows.
  # LocalQuackBackend wraps it as `powershell.exe -File <this> <port> <token>`.
  # Override with QOD_SPAWN_SCRIPT_WINDOWS when the script lives outside the repo.
  spawnScriptWindows = "./scripts/spawn-quack-node.ps1"
  spawnScriptWindows = ${?QOD_SPAWN_SCRIPT_WINDOWS}

  drainTimeoutSec = 60
  drainTimeoutSec = ${?QOD_DRAIN_TIMEOUT_SEC}
  healthCheckIntervalSec = 5
  healthCheckIntervalSec = ${?QOD_HEALTH_CHECK_INTERVAL_SEC}

  # Seconds between supervisor reconcile passes. Each pass re-checks every
  # persisted node and respawns the dead ones, so a node lost while the manager
  # is up is recovered without waiting for a restart. Drained pools (zero
  # distribution) are left alone. Set to 0 to disable the periodic loop;
  # reconcile still runs once at boot.
  reconcileIntervalSec = 30
  reconcileIntervalSec = ${?QOD_RECONCILE_INTERVAL_SEC}

  # --- HA (multi-replica manager, Kubernetes runtime only) -------------------
  ha {
    enabled = false
    enabled = ${?QOD_HA_ENABLED}
    leaderRetrySec = 3
    leaderRetrySec = ${?QOD_LEADER_RETRY_SEC}
    topologyRefreshSec = 30
    topologyRefreshSec = ${?QOD_TOPOLOGY_REFRESH_SEC}
  }

  # UI session idle TTL in seconds. A session unused this long is dropped on the
  # next access. Each successful access slides the window. Default: 8h (28800s).
  sessionIdleTtlSec = 28800
  sessionIdleTtlSec = ${?QOD_SESSION_IDLE_TTL_SEC}

  # Bootstrap admin user seeded into `qodstate_user` on startup (idempotent).
  # The row is created on every boot, password re-hashed via bcrypt so changing
  # the env var + restart is sufficient to rotate. Used by `auth.database` -
  # other backends ignore this. Set a strong password before exposing the edge.
  admin {
    username = "admin@localhost.local,admin"
    username = ${?QOD_ADMIN_USERNAME}
    password = "admin"
    password = ${?QOD_ADMIN_PASSWORD}
    role     = "admin"
    role     = ${?QOD_ADMIN_ROLE}
  }

  # Default metastore key/value pairs propagated to every spawned Quack node
  # as environment variables. CreatePoolRequest.metastore entries override
  # these per-pool. Key names match the spawn-quack-node.sh contract.
  #
  # Each field accepts a matching QOD_PG_* env var so the whole stack
  # (metastore + state store + auth DB lookup) can be redirected at one
  # Postgres instance from the environment without editing config.
  defaultMetastore {
    pgHost     = "localhost"
    pgHost     = ${?QOD_PG_HOST}
    pgPort     = "5432"
    pgPort     = ${?QOD_PG_PORT}
    pgUser     = "postgres"
    pgUser     = ${?QOD_PG_USER}
    pgPassword = "azizam"
    pgPassword = ${?QOD_PG_PASSWORD}
    # The *control-plane* Postgres database name. Holds Liquibase's
    # `qodstate_*` tables (tenant/tenant_db/pool/node, users + RBAC,
    # federation). Each tenant-db (`${tenant}_${suffix}`) lives in its
    # own separate Postgres database on the same server, so this name
    # is reserved for the shared control plane and should never collide
    # with a tenant name.
    dbName     = "qod"
    dbName     = ${?QOD_PG_DBNAME}
    schemaName = "main"
    schemaName = ${?QOD_PG_SCHEMA}
    # Default: relative to the JVM's working directory (typically the
    # repo root when launched via scripts/run-jar.sh, which `cd`s there
    # before exec). Override with an absolute path via the env var to
    # park the data outside the repo (e.g. a mounted volume).
    dataPath   = "./ducklake/tpch"
    dataPath   = ${?QOD_DUCKLAKE_DATA_PATH}
  }

  k8s {
    namespace = "default"
    namespace = ${?QOD_K8S_NAMESPACE}
    image = "starlakeai/quack-on-demand-node:latest-snapshot"
    image = ${?QOD_K8S_IMAGE}
    serviceAccount = ${?QOD_K8S_SERVICE_ACCOUNT}
    serviceType = "ClusterIP"
    serviceType = ${?QOD_K8S_SERVICE_TYPE}
    quackPort = 8080
    quackPort = ${?QOD_K8S_QUACK_PORT}
    startupTimeoutSec = 120
    startupTimeoutSec = ${?QOD_K8S_STARTUP_TIMEOUT_SEC}
    podLabel = "managed-by=quack-on-demand"
    podLabel = ${?QOD_K8S_POD_LABEL}
    podTemplateEnabled = false
    podTemplateEnabled = ${?QOD_POD_TEMPLATE_ENABLED}
  }

  metrics {
    # Single active sink. One of: "prometheus" | "aws" | "azure" | "gcp" | "none".
    sink = "prometheus"
    sink = ${?QOD_METRICS_SINK}

    # Static labels added to every series (multi-cluster identification).
    commonTags {
      deployment = ${?QOD_METRICS_DEPLOYMENT}
      region     = ${?QOD_METRICS_REGION}
    }

    aws {
      namespace = "quack-on-demand"
      namespace = ${?QOD_METRICS_AWS_NAMESPACE}
      stepSeconds = 60
      stepSeconds = ${?QOD_METRICS_AWS_STEP_SEC}
    }

    azure {
      instrumentationKey = ${?QOD_METRICS_AZURE_KEY}
      stepSeconds = 60
      stepSeconds = ${?QOD_METRICS_AZURE_STEP_SEC}
    }

    gcp {
      projectId = ${?QOD_METRICS_GCP_PROJECT_ID}
      stepSeconds = 60
      stepSeconds = ${?QOD_METRICS_GCP_STEP_SEC}
    }
  }

  # Where federation secrets are resolved from at node spawn.
  #
  # `dispatch` (the default) inspects each secret row and routes it to
  # the right backend: value-backed rows -> Postgres; externalRef-backed
  # rows route by prefix. One manager can mix backends.
  #
  # Force a single backend (locks every secret to that store):
  #   postgres   - the value lives in qodstate_federated_secret.value
  #   env        - externalRef = "env:VAR_NAME"; resolved via System.getenv
  #   aws-sm     - externalRef = "aws-sm:arn:..." or "aws-sm:name#jsonKey" (STUB)
  #   gcp-sm     - externalRef = "gcp-sm:projects/.../secrets/..." (STUB)
  #   azure-kv   - externalRef = "azure-kv:<name>"; vault URL from config (STUB)
  #   vault      - externalRef = "vault:secret/data/path#key" (STUB)
  federation {
    secretStore = "dispatch"
    secretStore = ${?QOD_FEDERATION_SECRET_STORE}
  }

  telemetry {
    store = "postgres"        # postgres | none (none records nothing anywhere)
    store = ${?QOD_TELEMETRY_STORE}
    auditRetentionDays = 90
    auditRetentionDays = ${?QOD_AUDIT_RETENTION_DAYS}
    journalCapacity = 8192
    journalCapacity = ${?QOD_TELEMETRY_JOURNAL_CAPACITY}
    stmtHistoryRetentionDays = 7
    stmtHistoryRetentionDays = ${?QOD_STMT_HISTORY_RETENTION_DAYS}
    hourlyRollupRetentionDays = 90
    hourlyRollupRetentionDays = ${?QOD_HOURLY_ROLLUP_RETENTION_DAYS}
    rollupIntervalSec = 300
    rollupIntervalSec = ${?QOD_ROLLUP_INTERVAL_SEC}
    usageRetentionDays = 400
    usageRetentionDays = ${?QOD_USAGE_RETENTION_DAYS}
  }

  maintenance {
    enabled = true
    enabled = ${?QOD_MAINT_ENABLED}
    tickSec = 60
    tickSec = ${?QOD_MAINT_TICK_SEC}
    maxConcurrent = 2
    maxConcurrent = ${?QOD_MAINT_MAX_CONCURRENT}
    minIntervalMin = 30
    minIntervalMin = ${?QOD_MAINT_MIN_INTERVAL_MIN}
    runTimeoutMin = 60
    runTimeoutMin = ${?QOD_MAINT_RUN_TIMEOUT_MIN}
    nodeReadyTimeoutSec = 180
    nodeReadyTimeoutSec = ${?QOD_MAINT_NODE_READY_TIMEOUT_SEC}
  }

  # Catalog browser read surface (Spec 00 time-travel viewer).
  catalog {
    # Audit catalog browser reads (one catalog.read event per gated GET).
    # Off by default: reads are chatty; mutations are always audited.
    auditCatalogReads = false
    auditCatalogReads = ${?QOD_AUDIT_CATALOG_READS}
    previewMaxRows = 1000
    previewMaxRows = ${?QOD_CATALOG_PREVIEW_MAX_ROWS}
    previewTimeoutSec = 30
    previewTimeoutSec = ${?QOD_CATALOG_PREVIEW_TIMEOUT_SEC}
    undropTimeoutSec = 300
    undropTimeoutSec = ${?QOD_CATALOG_UNDROP_TIMEOUT_SEC}
    restoreTimeoutSec = 300
    restoreTimeoutSec = ${?QOD_CATALOG_RESTORE_TIMEOUT_SEC}
  }

  # Management-plane (REST/UI) authentication split. Independent of the
  # FlightSQL edge auth (which stays claims-driven). When identitySource
  # is "db" (default) the qodstate_user row is the identity AND the
  # source of role/tenant. When "oidc" the configured OIDC backend
  # (keycloak/azure/google ROPC today) verifies the password and yields
  # an identity; the manager then looks the identity up in qodstate_user
  # to resolve role + the set of manageable tenants. Empty grants =>
  # 403 not_provisioned. JWT role/tenant claims are discarded.
  auth {
    management {
      identitySource = "db"
      identitySource = ${?QOD_MGMT_IDENTITY_SOURCE}

      # HS256 secret used to sign UI session JWTs. The default below is a
      # WELL-KNOWN DEV VALUE -- ANY deployment past laptop scope MUST
      # override via QOD_SESSION_JWT_SECRET, because anyone with this
      # file can forge admin sessions otherwise. Pin a stable production
      # value (>= 32 chars, ideally 64+ random bytes) to make sessions
      # survive manager restart AND share session state across replicas.
      # Main.scala emits a startup warning whenever the default is in use.
      sessionJwtSecret = "qod-dev-session-secret-rotate-in-production-x9k2v7p3m8q1"
      sessionJwtSecret = ${?QOD_SESSION_JWT_SECRET}

      # Secure flag on the qod_session cookie.
      #   auto  (default) -> derive per-request from X-Forwarded-Proto:
      #                       https -> Secure, http (or no header) -> not Secure.
      #                       Makes run-jar.sh on http://localhost and helm behind a
      #                       TLS ingress both Just Work without an env var.
      #   true            -> force Secure regardless of request scheme. Useful when
      #                       fronted by a TLS terminator that does NOT inject
      #                       X-Forwarded-Proto (some cloud LBs, TLS passthrough).
      #   false           -> force not Secure. Useful for stunnel-style local TLS
      #                       termination where you want to opt out of derivation.
      sessionCookieSecure = "auto"
      sessionCookieSecure = ${?QOD_SESSION_COOKIE_SECURE}

      # Path attribute on the qod_session cookie. Default '/api' covers
      # the same-origin SPA + reverse-proxy case. Override when the
      # manager sits behind a path-rewriting proxy: the value must match
      # the BROWSER-visible URL prefix. Example: proxy mounted at
      # https://platform.example.com/quack/api/* -> set to '/quack/api'.
      sessionCookiePath = "/api"
      sessionCookiePath = ${?QOD_SESSION_COOKIE_PATH}

      publicBaseUrl = ""
      publicBaseUrl = ${?QOD_MGMT_PUBLIC_BASE_URL}

      oidc {
        issuerUrl    = ""
        issuerUrl    = ${?QOD_MGMT_OIDC_ISSUER_URL}
        clientId     = ""
        clientId     = ${?QOD_MGMT_OIDC_CLIENT_ID}
        clientSecret = ""
        clientSecret = ${?QOD_MGMT_OIDC_CLIENT_SECRET}
        scopes       = "openid email profile"
        scopes       = ${?QOD_MGMT_OIDC_SCOPES}
      }
    }
  }
}

quack-flightsql {
  host = "0.0.0.0"
  host = ${?PROXY_HOST}
  port = 31338
  port = ${?PROXY_PORT}

  tlsEnabled = true
  tlsEnabled = ${?PROXY_TLS_ENABLED}
  tlsCertChain = "certs/server-cert.pem"
  tlsCertChain = ${?PROXY_TLS_CERT_CHAIN}
  tlsPrivateKey = "certs/server-key.pem"
  tlsPrivateKey = ${?PROXY_TLS_PRIVATE_KEY}

  # The edge does not apply any defaults. Every client must address a
  # specific (tenant, pool) via the plain-named gRPC headers `tenant`
  # and `pool`. The owning tenant-db is resolved server-side -- pool
  # names are unique within a tenant (enforced by the
  # `qodstate_pool_tenant_name_unique` constraint), so (tenant, pool)
  # uniquely picks one tenant-db. For the Arrow Flight SQL JDBC
  # driver these route naturally from URL query params -- e.g.
  # `jdbc:arrow-flight-sql://host:port/?tenant=tpch&pool=sales`
  # alongside `user=` / `password=`.
  #
  # AuthScope picks the realm:
  #   - `?superuser=true` -> System realm (global HOCON auth.*). The
  #     tenant/pool params still drive query routing.
  #   - absent / false -> Tenant realm (per-tenant qodstate_tenant.authConfig).

  # Edge session TTL in seconds. After a handshake validates a Basic /
  # external Bearer credential, the resulting peerId is cached in
  # ConnectionContext. Past this TTL the next Flight RPC forces a fresh
  # handshake - re-validating against the providers. Bounds the
  # "revoked credential still works" window. Default 1 hour.
  sessionTtlSec = 3600
  sessionTtlSec = ${?QOD_SESSION_TTL_SEC}

  # Max seconds the edge holds a statement aimed at a suspended pool while
  # the pool cold-starts (resume respawns nodes to the stored distribution).
  # On expiry the client gets a retryable "pool is resuming" UNAVAILABLE.
  resumeHoldTimeoutSec = 60
  resumeHoldTimeoutSec = ${?PROXY_RESUME_HOLD_TIMEOUT_SEC}

  # Pluggable authentication for the FlightSQL edge. `database` is enabled
  # by default - the manager seeds qodstate_user with the configured admin
  # at startup so the edge has at least one valid credential out of the box.
  # JWT / OIDC providers (jwt, keycloak, google, azure, aws) default OFF;
  # flip the one(s) you want on. Disabling all backends falls back to the
  # v1 "trust the client" behavior - fine for local dev, never for prod.
  auth {
    roleClaim = "role"
    roleClaim = ${?QOD_AUTH_ROLE_CLAIM}

    # (tenant, username) + bcrypt-hashed password lookup against any
    # JDBC-reachable database. Defaults to the same Postgres instance as
    # defaultMetastore; override QOD_AUTH_DB_* to point elsewhere.
    #
    # Two queries, picked by AuthScope at the wire:
    #   - `systemQuery` - AuthScope.System (manager UI login with empty
    #     tenant, FlightSQL `?superuser=true`). One placeholder: username.
    #     Matches the `tenant IS NULL` row (the bootstrap admin).
    #   - `tenantQuery` - AuthScope.Tenant. Two placeholders in order:
    #     tenant, username. Matches the `tenant = ?` row.
    #
    # No fallback between scopes: a tenant credential cannot authenticate a
    # system login and vice versa. Each query MUST return exactly three
    # columns, in order: (password_hash, role, enabled). The third column
    # (enabled) is MANDATORY, not optional: a false value rejects the login
    # with the same error as a wrong password, and a query that omits this
    # column fails every login outright (config error, not a tolerant
    # default-to-enabled). Main validates the column count of both queries
    # at startup and refuses to boot on a mismatch.
    database {
      # On by default - the manager seeds the admin user (qodstate_user)
      # at startup so out-of-the-box `admin / admin` works. Rotate via
      # QOD_ADMIN_PASSWORD before going to production. Flip the env
      # var to "false" to disable DB auth entirely (e.g. local-only dev
      # behind a separate proxy).
      enabled  = true
      enabled  = ${?QOD_AUTH_DB_ENABLED}
      jdbcUrl  = "jdbc:postgresql://"${quack-on-demand.defaultMetastore.pgHost}":"${quack-on-demand.defaultMetastore.pgPort}"/"${quack-on-demand.defaultMetastore.dbName}
      jdbcUrl  = ${?QOD_AUTH_DB_JDBC_URL}
      username = ${quack-on-demand.defaultMetastore.pgUser}
      username = ${?QOD_AUTH_DB_USER}
      password = ${quack-on-demand.defaultMetastore.pgPassword}
      password = ${?QOD_AUTH_DB_PASSWORD}
      systemQuery = "SELECT password_hash, role, enabled FROM qodstate_user WHERE tenant IS NULL AND username = ? LIMIT 1"
      systemQuery = ${?QOD_AUTH_DB_SYSTEM_QUERY}
      tenantQuery = "SELECT password_hash, role, enabled FROM qodstate_user WHERE tenant = ? AND username = ? LIMIT 1"
      tenantQuery = ${?QOD_AUTH_DB_TENANT_QUERY}
    }

    # External JWT issuers (custom signing key, not OIDC). Either secretKey
    # (HS256/HS512) or publicKeyPath (RSA/ECDSA PEM). Both empty disables;
    # presence of either turns the bearer provider on.
    jwt {
      secretKey     = ""
      secretKey     = ${?JWT_SECRET_KEY}
      publicKeyPath = ""
      publicKeyPath = ${?JWT_PUBLIC_KEY_PATH}
      issuer        = ""
      issuer        = ${?JWT_ISSUER}
      audience      = ""
      audience      = ${?JWT_AUDIENCE}
    }

    # OIDC providers (JWKS-validated bearer tokens; Keycloak supports ROPC).
    keycloak {
      enabled      = false
      enabled      = ${?QOD_AUTH_KEYCLOAK_ENABLED}
      baseUrl      = "https://keycloak.example.com"
      baseUrl      = ${?QOD_AUTH_KEYCLOAK_BASE_URL}
      realm        = "quack"
      realm        = ${?QOD_AUTH_KEYCLOAK_REALM}
      clientId     = ""
      clientId     = ${?QOD_AUTH_KEYCLOAK_CLIENT_ID}
      clientSecret = ""
      clientSecret = ${?QOD_AUTH_KEYCLOAK_CLIENT_SECRET}
      # Expected token issuer override. Empty = derive from baseUrl + realm.
      # Set when Keycloak's browser-facing issuer differs from the in-cluster
      # baseUrl used for JWKS (ingress / split-horizon).
      issuer       = ""
      issuer       = ${?QOD_AUTH_KEYCLOAK_ISSUER}
    }
    google {
      enabled               = false
      enabled               = ${?QOD_AUTH_GOOGLE_ENABLED}
      clientId              = ""
      clientId              = ${?QOD_AUTH_GOOGLE_CLIENT_ID}
      clientSecret          = ""
      clientSecret          = ${?QOD_AUTH_GOOGLE_CLIENT_SECRET}
      groupsLookup          = false
      groupsLookup          = ${?QOD_AUTH_GOOGLE_GROUPS_LOOKUP}
      serviceAccountKeyPath = ""
      serviceAccountKeyPath = ${?QOD_AUTH_GOOGLE_SVC_ACCT_KEY_PATH}
      groupsCacheTtlSeconds = 300
      groupsCacheTtlSeconds = ${?QOD_AUTH_GOOGLE_GROUPS_CACHE_TTL_SEC}
    }
    azure {
      enabled      = false
      enabled      = ${?QOD_AUTH_AZURE_ENABLED}
      tenantId     = ""
      tenantId     = ${?QOD_AUTH_AZURE_TENANT_ID}
      clientId     = ""
      clientId     = ${?QOD_AUTH_AZURE_CLIENT_ID}
      clientSecret = ""
      clientSecret = ${?QOD_AUTH_AZURE_CLIENT_SECRET}
    }
    aws {
      enabled    = false
      enabled    = ${?QOD_AUTH_AWS_ENABLED}
      region     = "us-east-1"
      region     = ${?QOD_AUTH_AWS_REGION}
      userPoolId = ""
      userPoolId = ${?QOD_AUTH_AWS_USER_POOL_ID}
      clientId   = ""
      clientId   = ${?QOD_AUTH_AWS_CLIENT_ID}
    }

    # OAuth scopes requested by the browser SQL-token flow (/api/auth/sql-token),
    # which logs in against the edge OIDC provider and hands a JDBC client a bearer
    # to paste into DBeaver's `token` property.
    oauthScopes = "openid profile email"
    oauthScopes = ${?QOD_AUTH_OAUTH_SCOPES}
  }
  validation {
    enabled = true
    enabled = ${?QOD_VALIDATION_ENABLED}
    allowByDefault = true
    allowByDefault = ${?QOD_VALIDATION_ALLOW_BY_DEFAULT}
    # Comma-separated list of usernames that skip SQL validation entirely.
    bypassUsers = "admin@localhost.local,admin"
    bypassUsers = ${?QOD_VALIDATION_BYPASS_USERS}
  }
  # Table-level access control. When enabled, every SQL statement is
  # checked against the cached RBAC EffectiveSet pinned on the
  # FlightSQL ConnectionContext at handshake time. Superusers
  # (qodstate_user.tenant IS NULL) bypass; tenant-scoped principals
  # need a covering qodstate_role_permission row reachable through
  # one of their effective roles. Disabled by default so first-run
  # smoke tests work; flip `QOD_ACL_ENABLED=true` to enforce.
  acl {
    enabled = false
    enabled = ${?QOD_ACL_ENABLED}
    # Statement parser dialect. "duckdb" is the only one wired today.
    dialect = "duckdb"
    dialect = ${?QOD_ACL_DIALECT}
  }
}