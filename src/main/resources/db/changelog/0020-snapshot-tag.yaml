databaseChangeLog:
  - changeSet:
      id: 0020-qodstate-snapshot-tag
      author: quack-on-demand
      changes:
        - createTable:
            tableName: qodstate_snapshot_tag
            columns:
              - column: { name: id,          type: VARCHAR(64), constraints: { primaryKey: true, nullable: false } }
              - column: { name: tenant,      type: TEXT,        constraints: { nullable: false } }
              - column: { name: tenant_db,   type: TEXT,        constraints: { nullable: false } }
              - column: { name: name,        type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: snapshot_id, type: BIGINT,      constraints: { nullable: false } }
              - column: { name: protected,   type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_by,  type: TEXT }
              - column: { name: created_at,  type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: NOW(), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: qodstate_snapshot_tag
            columnNames: tenant, tenant_db, name
            constraintName: uq_qodstate_snapshot_tag_scope_name
        - createIndex:
            indexName: idx_qodstate_snapshot_tag_scope
            tableName: qodstate_snapshot_tag
            columns:
              - column: { name: tenant }
              - column: { name: tenant_db }
