databaseChangeLog:
  - changeSet:
      id: 0019-qodstate-stmt-history
      author: quack-on-demand
      changes:
        - createTable:
            tableName: qodstate_stmt_history
            columns:
              - column: { name: id,          type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: ts,          type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: username,    type: TEXT, constraints: { nullable: false } }
              - column: { name: tenant,      type: TEXT, constraints: { nullable: false } }
              - column: { name: pool,        type: TEXT, constraints: { nullable: false } }
              - column: { name: node_id,     type: TEXT, constraints: { nullable: false } }
              - column: { name: sql,         type: TEXT, constraints: { nullable: false } }
              - column: { name: status,      type: TEXT, constraints: { nullable: false } }
              - column: { name: duration_ms, type: BIGINT, constraints: { nullable: false } }
              - column: { name: prepare_ms,  type: BIGINT }
              - column: { name: error,       type: TEXT }
        - createIndex:
            indexName: idx_qodstate_stmt_history_ts
            tableName: qodstate_stmt_history
            columns:
              - column: { name: ts }
        - createIndex:
            indexName: idx_qodstate_stmt_history_tenant_ts
            tableName: qodstate_stmt_history
            columns:
              - column: { name: tenant }
              - column: { name: ts }
        - createTable:
            tableName: qodstate_stmt_rollup
            columns:
              - column: { name: bucket_start,   type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: granularity,    type: TEXT, constraints: { nullable: false } }
              - column: { name: tenant,         type: TEXT, constraints: { nullable: false } }
              - column: { name: pool,           type: TEXT, constraints: { nullable: false } }
              - column: { name: username,       type: TEXT, constraints: { nullable: false } }
              - column: { name: stmt_count,     type: BIGINT, constraints: { nullable: false } }
              - column: { name: error_count,    type: BIGINT, constraints: { nullable: false } }
              - column: { name: denied_count,   type: BIGINT, constraints: { nullable: false } }
              - column: { name: engine_ms_sum,  type: BIGINT, constraints: { nullable: false } }
              - column: { name: p50_ms,         type: DOUBLE PRECISION }
              - column: { name: p95_ms,         type: DOUBLE PRECISION }
              - column: { name: p99_ms,         type: DOUBLE PRECISION }
        - addPrimaryKey:
            tableName:      qodstate_stmt_rollup
            columnNames:    granularity, bucket_start, tenant, pool, username
            constraintName: pk_qodstate_stmt_rollup
        - createTable:
            tableName: qodstate_rollup_watermark
            columns:
              - column: { name: id,             type: INT, constraints: { primaryKey: true, nullable: false } }
              - column: { name: last_rolled_ts, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
