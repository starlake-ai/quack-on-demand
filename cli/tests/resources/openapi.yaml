  /api/catalog/restore:
    post:
      description: 'Restore a live table to a prior snapshot as a NEW forward snapshot
        (non-destructive: history is preserved and the pre-restore state stays queryable;
        the replace assigns a new table id, so the per-table history timeline restarts
        at the restore). dryRun returns the change summary that would be undone and
        performs no write. Requires an ALL grant, or DDL plus RO/RW, on the table.
        409 concurrent_write when expectedCurrentSnapshot no longer matches the table''s
        latest snapshot; 410 snapshot_expired; 422 invalid_snapshot when the table
        does not resolve at the target.'
