name: cli

on:
  push:
    branches: [main]
    paths: ["cli/**", ".github/workflows/cli.yml"]
  pull_request:
    paths: ["cli/**", ".github/workflows/cli.yml"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e './cli[dev]'
      - run: python -m pytest cli/tests -q
