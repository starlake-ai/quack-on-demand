name: quackwire native build

# Builds the JNI shim `libquackwire.{so,dylib}` for the four platforms the
# manager runs on, then aggregates them into a draft GitHub Release whose
# tag encodes the pinned `duckdb-quack` short SHA (per design doc §9.7 /
# §9.9). The sbt `fetchQuackwire` task in `project/QuackwireArtifact.scala`
# consumes the release at compile time so a normal `sbt assembly` does not
# need a local C/C++ toolchain.
#
# Co-pinned versions (single source of truth: design doc §9.9):
#   - duckdb-quack : 7e80f7ffcc98d0b3e81d0e1df8cc1c2da240a64b
#                    (branch v1.5-variegata, short 7e80f7ffcc98)
#   - libduckdb    : v1.5.5 official release zips on every platform:
#                    libduckdb-{linux-amd64,linux-arm64,osx-universal,
#                    windows-amd64}.zip. Homebrew is NOT used (its bottle
#                    lags releases; it was still 1.5.4 on 2026-07-22).
#
# Runner labels (verified 2026-06-01):
#   - ubuntu-22.04        : standard linux/x86_64, free on public repos
#   - ubuntu-22.04-arm    : linux/arm64, free on public repos since
#                           https://github.blog/changelog/2025-01-16-...
#   - macos-15-intel      : x86_64 macOS; macos-13 is deprecated as of
#                           the 2026 runner-images cleanup so we use the
#                           current Intel-on-macOS-15 image instead
#   - macos-14            : arm64 macOS (Apple Silicon)

on:
  push:
    branches: [main]
    paths:
      - 'native/quackwire/**'
      - 'libquackwire/**'
      - 'project/LibquackwireArtifacts.scala'
      - 'build.sbt'
      - '.github/workflows/quackwire.yml'
  pull_request:
    paths:
      - 'native/quackwire/**'
      - 'libquackwire/**'
      - 'project/LibquackwireArtifacts.scala'
      - 'build.sbt'
      - '.github/workflows/quackwire.yml'
  workflow_dispatch:

concurrency:
  group: quackwire-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------------------------------------------------
  # 1. Per-platform native build
  # -----------------------------------------------------------------------
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux-x86_64
            libname: libquackwire.so
            os: linux
            duckdb_zip: libduckdb-linux-amd64.zip
          - runner: ubuntu-22.04-arm
            platform: linux-aarch64
            libname: libquackwire.so
            os: linux
            duckdb_zip: libduckdb-linux-arm64.zip
          - runner: macos-15-intel
            platform: osx-x86_64
            libname: libquackwire.dylib
            os: macos
            duckdb_zip: libduckdb-osx-universal.zip
          - runner: macos-14
            platform: osx-aarch64
            libname: libquackwire.dylib
            os: macos
            duckdb_zip: libduckdb-osx-universal.zip
    steps:
      - name: Checkout (with duckdb-quack submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21 (for jni.h)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # --- libduckdb v1.5.5 install ---------------------------------------
      # macOS: assemble DUCKDB_HOME from the official release zip, same
      # pattern as Windows. We deliberately do NOT use Homebrew: its bottle
      # lags DuckDB releases (still 1.5.4 the day 1.5.5 shipped) and the
      # macOS leg must link the exact pinned ABI. CMakeLists probes
      # $ENV{DUCKDB_HOME}{,/include,/lib} FIRST, so this wins over any
      # /opt/homebrew leftovers on the runner.
      - name: Install libduckdb v1.5.5 (macOS)
        if: matrix.os == 'macos'
        env:
          DUCKDB_ZIP: ${{ matrix.duckdb_zip }}
        run: |
          set -euo pipefail
          home="$RUNNER_TEMP/duckdb-home"
          mkdir -p "$home/include" "$home/lib"
          tmp=$(mktemp -d)
          curl -fsSL -o "$tmp/$DUCKDB_ZIP" \
            "https://github.com/duckdb/duckdb/releases/download/v1.5.5/$DUCKDB_ZIP"
          unzip -o "$tmp/$DUCKDB_ZIP" -d "$tmp/extracted"
          cp "$tmp/extracted/duckdb.h"   "$home/include/duckdb.h"
          cp "$tmp/extracted/duckdb.hpp" "$home/include/duckdb.hpp"
          cp "$tmp/extracted/libduckdb.dylib" "$home/lib/libduckdb.dylib"
          # Nested INTERNAL headers (duckdb/common/serializer/*.hpp etc.),
          # same reason as the Linux step below.
          git clone --depth 1 --branch v1.5.5 https://github.com/duckdb/duckdb "$tmp/duckdb-src"
          cp -r "$tmp/duckdb-src/src/include/duckdb" "$home/include/"
          echo "DUCKDB_HOME=$home" >> "$GITHUB_ENV"
          ls -l "$home/lib/libduckdb.dylib" "$home/include/duckdb.hpp"
          ls "$home/include/duckdb/common/serializer/binary_serializer.hpp"

      # Linux: download the official libduckdb release zip and stage into
      # /usr/local. The CMake `find_path / find_library` hints in
      # native/quackwire/CMakeLists.txt cover /usr/local/{include,lib}.
      # Verified asset names on the v1.5.5 release page:
      #   libduckdb-linux-amd64.zip   (x86_64)
      #   libduckdb-linux-arm64.zip   (aarch64)
      # (gh api repos/duckdb/duckdb/releases/tags/v1.5.5 .assets[].name)
      - name: Install libduckdb v1.5.5 (Linux)
        if: matrix.os == 'linux'
        env:
          DUCKDB_ZIP: ${{ matrix.duckdb_zip }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip ca-certificates curl cmake build-essential git
          tmp=$(mktemp -d)
          # 1. Binary + amalgamated public headers from the official release.
          curl -fsSL -o "$tmp/$DUCKDB_ZIP" \
            "https://github.com/duckdb/duckdb/releases/download/v1.5.5/$DUCKDB_ZIP"
          unzip -o "$tmp/$DUCKDB_ZIP" -d "$tmp/extracted"
          sudo install -m 0644 "$tmp/extracted/duckdb.h"   /usr/local/include/duckdb.h
          sudo install -m 0644 "$tmp/extracted/duckdb.hpp" /usr/local/include/duckdb.hpp
          sudo install -m 0755 "$tmp/extracted/libduckdb.so" /usr/local/lib/libduckdb.so
          # 2. Nested INTERNAL headers (duckdb/common/serializer/*.hpp etc.).
          # The release zip ships only the amalgamated duckdb.{h,hpp}; the
          # duckdb-quack message layer pulls `duckdb/common/serializer/
          # binary_serializer.hpp` directly; we grab them from a shallow
          # clone at the same tag.
          git clone --depth 1 --branch v1.5.5 https://github.com/duckdb/duckdb "$tmp/duckdb-src"
          sudo cp -r "$tmp/duckdb-src/src/include/duckdb" /usr/local/include/
          sudo ldconfig
          ls -l /usr/local/lib/libduckdb.so /usr/local/include/duckdb.hpp
          ls /usr/local/include/duckdb/common/serializer/binary_serializer.hpp

      - name: CMake configure
        working-directory: native/quackwire
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        working-directory: native/quackwire
        run: cmake --build build --config Release

      - name: Verify artifact
        working-directory: native/quackwire/build
        run: |
          set -euo pipefail
          ls -la "${{ matrix.libname }}"
          file "${{ matrix.libname }}" || true
          # Smoke-check the smokeAnswer symbol made it through the link.
          if command -v nm >/dev/null 2>&1; then
            nm -gU "${{ matrix.libname }}" 2>/dev/null | grep -i smokeAnswer || \
              nm    "${{ matrix.libname }}" 2>/dev/null | grep -i smokeAnswer || \
              echo "warn: smokeAnswer symbol not found via nm"
          fi

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: quackwire-${{ matrix.platform }}
          path: native/quackwire/build/${{ matrix.libname }}
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------------
  # 1b. Windows native build (MSVC) -> quackwire.dll
  # -----------------------------------------------------------------------
  # Separate job (not a matrix row) because the toolchain is MSVC + a
  # hand-assembled DUCKDB_HOME rather than a system package. Produces the
  # un-prefixed `quackwire.dll` (System.mapLibraryName has no "lib" prefix on
  # Windows), uploaded as quackwire-windows-x86_64 so the publish job's
  # `quackwire-*` glob picks it up alongside the four Unix artifacts.
  build-windows:
    name: build windows-x86_64
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - name: Checkout (with duckdb-quack submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21 (for jni.h / jni_md.h win32)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Assemble DUCKDB_HOME the way CMakeLists.txt expects: duckdb.lib + the
      # FULL duckdb/ include tree. The release zip ships only the amalgamated
      # duckdb.{h,hpp}; the duckdb-quack message layer also pulls internal
      # headers (duckdb/common/serializer/binary_serializer.hpp), grabbed from a
      # shallow clone at the same v1.5.5 tag. Runs in git-bash for parity with
      # the Linux step.
      - name: Install libduckdb v1.5.5 (Windows)
        shell: bash
        run: |
          set -euo pipefail
          home="$RUNNER_TEMP/duckdb-home"
          mkdir -p "$home/include" "$home/lib"
          tmp="$(mktemp -d)"
          curl -fsSL -o "$tmp/libduckdb.zip" \
            "https://github.com/duckdb/duckdb/releases/download/v1.5.5/libduckdb-windows-amd64.zip"
          unzip -o "$tmp/libduckdb.zip" -d "$tmp/dl"
          cp "$tmp/dl/duckdb.h"   "$home/include/duckdb.h"
          cp "$tmp/dl/duckdb.hpp" "$home/include/duckdb.hpp"
          cp "$tmp/dl/duckdb.lib" "$home/lib/duckdb.lib"
          cp "$tmp/dl/duckdb.dll" "$home/lib/duckdb.dll"
          git clone --depth 1 --branch v1.5.5 https://github.com/duckdb/duckdb "$tmp/duckdb-src"
          cp -r "$tmp/duckdb-src/src/include/duckdb" "$home/include/"
          ls "$home/lib/duckdb.lib" "$home/include/duckdb.hpp"
          ls "$home/include/duckdb/common/serializer/binary_serializer.hpp"
          echo "DUCKDB_HOME=$home" >> "$GITHUB_ENV"

      - name: CMake configure (Visual Studio 2022)
        working-directory: native/quackwire
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DDUCKDB_HOME="$env:DUCKDB_HOME"

      - name: CMake build (Release)
        working-directory: native/quackwire
        run: cmake --build build --config Release

      - name: Verify artifact
        working-directory: native/quackwire/build/Release
        run: |
          Get-ChildItem quackwire.dll
          # Best-effort export check: dumpbin is only on PATH inside an MSVC dev
          # shell, so a missing tool must not fail the build.
          $dumpbin = Get-Command dumpbin -ErrorAction SilentlyContinue
          if ($dumpbin) {
            & $dumpbin /exports quackwire.dll | Select-String -Pattern 'smokeAnswer' -SimpleMatch
          } else {
            Write-Host "dumpbin not on PATH; skipping export check"
          }

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: quackwire-windows-x86_64
          path: native/quackwire/build/Release/quackwire.dll
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------------
  # 2. Publish per-platform classifier jars to Sonatype Central snapshots
  # -----------------------------------------------------------------------
  # Runs on push-to-main and on manual workflow_dispatch from main.
  # Stages each platform binary into
  # libquackwire/binaries/<platform>/ and runs `sbt libquackwire/publish`.
  # Mirrors the manager's `.github/workflows/snapshot.yml` pattern:
  # plain `publish` (no GPG signing required), targets Central snapshots
  # because libquackwireVersion in build.sbt ends in -SNAPSHOT.
  #
  # build.sbt keeps pinning the last RELEASED (non-SNAPSHOT) coord between
  # libquackwire changes; the publish step below fails fast in that state to
  # signal that a native change landed without bumping libquackwireVersion
  # to a new -SNAPSHOT.
  #
  # Required repo secrets (shared with the manager's snapshot workflow):
  #   SONATYPE_USERNAME    Central Portal user token (NOT legacy OSSRH)
  #   SONATYPE_PASSWORD    Central Portal user token secret
  publish-central:
    name: publish libquackwire to Sonatype Central snapshots
    needs: [build, build-windows]
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download all per-platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: quackwire-*
          path: artifacts

      - name: Stage binaries into libquackwire/binaries/
        run: |
          set -euo pipefail
          for d in artifacts/quackwire-*; do
            platform=$(basename "$d" | sed 's/^quackwire-//')
            mkdir -p "libquackwire/binaries/$platform"
            # Unix artifacts carry libquackwire.{so,dylib}; the Windows artifact
            # carries the un-prefixed quackwire.dll. Copy whichever is present.
            cp "$d"/libquackwire.* "libquackwire/binaries/$platform/" 2>/dev/null || true
            cp "$d"/quackwire.dll  "libquackwire/binaries/$platform/" 2>/dev/null || true
          done
          find libquackwire/binaries -type f -ls

      - name: Publish to Sonatype Central snapshots
        env:
          # Include the 5th (Windows) classifier in this publish.
          QOD_WITH_WINDOWS_NATIVE: 'true'
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          set -euo pipefail
          version=$(sed -nE 's|^val libquackwireVersion = "(.*)"$|\1|p' build.sbt)
          if [[ "$version" != *-SNAPSHOT ]]; then
            echo "::error::libquackwireVersion is '$version' (non-SNAPSHOT): a native change" \
              "landed without bumping the version. Bump libquackwireVersion in build.sbt to a" \
              "new -SNAPSHOT (new rev; new duckdb prefix/hash if those changed) and re-push."
            exit 1
          fi
          sbt --no-colors --batch "libquackwire/publish"