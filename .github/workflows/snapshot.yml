name: snapshot

# Build + publish snapshot artifacts:
#   1. publish-jar   - assembly uber-jar -> Sonatype OSSRH snapshots
#                      (https://s01.oss.sonatype.org/content/repositories/snapshots/ai/starlake/...)
#   2. docker-build  - multi-arch Docker image (linux/amd64 + linux/arm64),
#                      pushed by digest to Docker Hub `starlakeai/quack-on-demand`.
#                      Runs in a 2-platform matrix so each arch builds in
#                      parallel; the merge job below stitches them into one
#                      manifest list under the snapshot tag.
#   3. docker-merge  - collects both digests, publishes the manifest list
#                      as `starlakeai/quack-on-demand:<version>` and
#                      `:latest-snapshot`.
#
# Required repo secrets:
#   SONATYPE_USERNAME    OSSRH user token name   (Settings -> User Token on s01)
#   SONATYPE_PASSWORD    OSSRH user token secret
#   DOCKERHUB_USERNAME   Docker Hub login
#   DOCKER_PASSWORD      Docker Hub access token (Personal Access Token, RW)
#
# Triggers:
#   - push to `main` (auto-snapshot per merged PR)
#   - workflow_dispatch (manual button in the Actions tab)

on:
  push:
    branches: [main]
  # Auto-rebuild after every successful `quackwire native build`. libquackwire's
  # 4 classifier jars are bundled into the manager assembly at build time, so
  # a republished -SNAPSHOT (same coord, new content) only reaches users once
  # we rebuild the assembly + docker image. workflow_run handles content-only
  # republishes; an actual libquackwire version bump touches build.sbt and
  # would re-trigger via the push event anyway.
  workflow_run:
    workflows: ["quackwire native build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight snapshot for the same ref so a fresh push doesn't
# leave two parallel publishes racing each other into OSSRH/Docker Hub.
concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: starlakeai/quack-on-demand

jobs:

  # -----------------------------------------------------------------------
  # 1. Sonatype OSSRH snapshot publish
  # -----------------------------------------------------------------------
  publish-jar:
    # Skip if a workflow_run trigger fired from a FAILED quackwire run.
    # push / workflow_dispatch leave `github.event.workflow_run` unset, so
    # the check defaults to "not failure" and runs normally.
    if: ${{ github.event.workflow_run.conclusion != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: '1.12.11'

      - name: Extract version from version.sbt
        id: extract-version
        run: |
          # Version lives in version.sbt since the sbt-release wiring;
          # build.sbt no longer carries `ThisBuild / version`.
          version=$(grep -E '^ThisBuild / version' version.sbt | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$version" ]]; then
            echo "::error::Failed to extract version from version.sbt" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publishing version: $version"

      - name: sbt publish (assembly jar -> OSSRH snapshot)
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          # Keep memory tight on GH runners; UI build + assembly is the heavy bit.
          SBT_OPTS: "-Xss8M -Xmx5g -XX:+UseG1GC"
        run: sbt -no-colors update clean publish

  # -----------------------------------------------------------------------
  # 2. Docker image build (per platform, push by digest)
  # -----------------------------------------------------------------------
  docker-build:
    needs: publish-jar
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    # Each platform builds on its own native runner - `ubuntu-latest` is
    # amd64, `ubuntu-24.04-arm` is native arm64 (free on public repos
    # since 2024). Previously both matrix legs ran on amd64 with QEMU
    # emulating arm64, which made the arm64 leg take ~10x longer than
    # the amd64 one.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        id: vcs

      - name: Set platform pair env
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata (labels only - tags applied in merge step)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.vendor=starlakeai
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.title=quack-on-demand
            org.opencontainers.image.description=Auto-scaling DuckDB-Quack manager with FlightSQL edge.
            org.opencontainers.image.url=https://github.com/starlake-ai/quack-on-demand
            org.opencontainers.image.source=https://github.com/starlake-ai/quack-on-demand
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest produces a digest reference (no tag yet); the
          # merge job below pulls both digests and assembles the manifest
          # list under the final tag.
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # GHA-side build cache keyed per platform.
          cache-from: type=gha,scope=docker-${{ env.PLATFORM_PAIR }}
          cache-to:   type=gha,scope=docker-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # -----------------------------------------------------------------------
  # 3. Merge per-arch digests into one tagged manifest list
  # -----------------------------------------------------------------------
  docker-merge:
    needs: [publish-jar, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          version="${{ needs.publish-jar.outputs.version }}"
          # Snapshot tagging:
          #   <version>          e.g. 0.1.0-SNAPSHOT
          #   latest-snapshot    moving alias to the most recent snapshot
          docker buildx imagetools create \
            -t "${{ env.REGISTRY_IMAGE }}:${version}" \
            -t "${{ env.REGISTRY_IMAGE }}:latest-snapshot" \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          version="${{ needs.publish-jar.outputs.version }}"
          docker buildx imagetools inspect "${{ env.REGISTRY_IMAGE }}:${version}"