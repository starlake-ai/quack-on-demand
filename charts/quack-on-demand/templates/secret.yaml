{{/*
Chart-managed Secrets for dev / kind installs. When `.existingSecret` is
set on the respective values block, we skip rendering and reference the
operator-managed Secret instead.
*/}}

{{- if and (not .Values.postgres.existingSecret) .Values.postgres.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  pgPassword: {{ .Values.postgres.password | quote }}
{{- end }}
---
{{- if and (not .Values.admin.existingSecret) .Values.admin.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  adminPassword: {{ .Values.admin.password | quote }}
{{- end }}
---
{{- if and (not .Values.apiKey.existingSecret) .Values.apiKey.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-apikey
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.apiKey.value | quote }}
{{- end }}
---
{{- if and (not .Values.s3.existingSecret) .Values.s3.accessKey .Values.s3.secretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  s3AccessKey: {{ .Values.s3.accessKey | quote }}
  s3SecretKey: {{ .Values.s3.secretKey | quote }}
{{- end }}
{{- if and (gt (.Values.replicaCount | int) 1) .Values.sessionJwtSecret (not .Values.existingSessionJwtSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-session-jwt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  sessionJwtSecret: {{ .Values.sessionJwtSecret | quote }}
{{- end }}