{{/*
Chart-managed Secrets for dev / kind installs. When `.existingSecret` is
set on the respective values block, we skip rendering and reference the
operator-managed Secret instead.
*/}}

{{- if and (not .Values.postgres.existingSecret) .Values.postgres.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  pgPassword: {{ .Values.postgres.password | quote }}
{{- end }}
---
{{- if and (not .Values.admin.existingSecret) .Values.admin.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  adminPassword: {{ .Values.admin.password | quote }}
{{- end }}
---
{{- if and (not .Values.apiKey.existingSecret) .Values.apiKey.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qod.fullname" . }}-apikey
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.apiKey.value | quote }}
{{- end }}