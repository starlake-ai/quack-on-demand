apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qod.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qod.labels" . | nindent 4 }}
data:
  # ---- Runtime + Postgres ---------------------------------------------------
  QOD_RUNTIME_TYPE:        "kubernetes"
  QOD_PG_HOST:             {{ .Values.postgres.host | quote }}
  QOD_PG_PORT:             {{ .Values.postgres.port | quote }}
  QOD_PG_USER:             {{ .Values.postgres.user | quote }}
  QOD_PG_DBNAME:           {{ .Values.postgres.dbName | quote }}
  QOD_PG_SCHEMA:           {{ .Values.postgres.schema | quote }}
  QOD_DUCKLAKE_DATA_PATH:  {{ .Values.storage.dataPath | quote }}

  # ---- K8s backend ----------------------------------------------------------
  # QOD_K8S_NAMESPACE is injected via fieldRef in the Deployment so it
  # always tracks the manager pod's own namespace.
  QOD_K8S_IMAGE:           {{ .Values.quackNode.image | quote }}
  # disable_ssl flag passed to quack_query in QuackHttpClient. Plain HTTP
  # by default; true means TLS NOT used on the manager<->node wire.
  QOD_NODE_DISABLE_SSL:    {{ not .Values.quackNode.tls.enabled | quote }}
  QOD_K8S_SERVICE_ACCOUNT: {{ include "qod.serviceAccountName" . | quote }}

  # ---- Admin bootstrap (idempotent) ----------------------------------------
  QOD_ADMIN_USERNAME:      {{ .Values.admin.username | quote }}

  {{- if .Values.loadTpc.enabled }}
  QOD_BOOTSTRAP_YAML: "classpath:bootstrap-demo.yaml"
  {{- end }}

  # ---- FlightSQL edge TLS ---------------------------------------------------
  PROXY_TLS_ENABLED:            {{ .Values.flightsql.tls.enabled | quote }}

  # ---- Metrics sink ---------------------------------------------------------
  QOD_METRICS_SINK:        {{ .Values.metrics.sink | quote }}

  {{- if .Values.auth.keycloak.enabled }}
  # ---- Keycloak OIDC bearer provider --------------------------------------
  # Manager treats keycloak as the AuthenticationService chain entry; ROPC
  # (resource-owner password credentials) lets FlightSQL clients exchange
  # admin/admin for a bearer at the edge. CLIENT_SECRET is mounted from a
  # Secret (see deployment.yaml) when set; the inline default below covers
  # the local kind rig.
  QOD_AUTH_KEYCLOAK_ENABLED:   {{ .Values.auth.keycloak.enabled   | quote }}
  QOD_AUTH_KEYCLOAK_BASE_URL:  {{ .Values.auth.keycloak.baseUrl   | quote }}
  QOD_AUTH_KEYCLOAK_REALM:     {{ .Values.auth.keycloak.realm     | quote }}
  QOD_AUTH_KEYCLOAK_CLIENT_ID: {{ .Values.auth.keycloak.clientId  | quote }}
  {{- with .Values.auth.keycloak.issuer }}
  # Expected-issuer override (split-horizon: browser issuer != in-cluster baseUrl).
  QOD_AUTH_KEYCLOAK_ISSUER: {{ . | quote }}
  {{- end }}
  {{- if and .Values.auth.keycloak.clientSecret (not .Values.auth.keycloak.existingSecret) }}
  QOD_AUTH_KEYCLOAK_CLIENT_SECRET: {{ .Values.auth.keycloak.clientSecret | quote }}
  {{- end }}
  {{- end }}

  {{- if eq (.Values.auth.management.identitySource | default "db") "oidc" }}
  # ---- Admin-UI OIDC SSO (management plane) --------------------------------
  # Provider-agnostic: endpoints are resolved from
  # ${issuerUrl}/.well-known/openid-configuration. The browser is redirected
  # to the IdP for /ui/ login (no password form). publicBaseUrl must match the
  # redirect URI registered on the IdP client
  # (${publicBaseUrl}/api/auth/oidc/callback).
  QOD_MGMT_IDENTITY_SOURCE:   {{ .Values.auth.management.identitySource | quote }}
  QOD_MGMT_PUBLIC_BASE_URL:   {{ .Values.auth.management.publicBaseUrl   | quote }}
  QOD_MGMT_OIDC_ISSUER_URL:   {{ .Values.auth.management.oidc.issuerUrl  | quote }}
  QOD_MGMT_OIDC_CLIENT_ID:    {{ .Values.auth.management.oidc.clientId   | quote }}
  {{- if .Values.auth.management.oidc.scopes }}
  QOD_MGMT_OIDC_SCOPES:       {{ .Values.auth.management.oidc.scopes     | quote }}
  {{- end }}
  {{- if and .Values.auth.management.oidc.clientSecret (not .Values.auth.management.oidc.existingSecret) }}
  # Inline secret for dev/kind. Prefer existingSecret in production so the
  # value never lands in the ConfigMap (see deployment.yaml secretKeyRef).
  QOD_MGMT_OIDC_CLIENT_SECRET: {{ .Values.auth.management.oidc.clientSecret | quote }}
  {{- end }}
  {{- end }}

  {{- if eq (include "qod.s3Enabled" .) "true" }}
  # ---- Object store (S3 / SeaweedFS / MinIO / R2) --------------------------
  # storage.dataPath is an s3:// URL. These vars land on the manager pod's
  # env; KubernetesQuackBackend forwards the `QOD_S3_*` prefix verbatim
  # into every spawned node pod, where spawn-quack-node.sh consumes them to
  # emit `CREATE SECRET quack_s3 (...)`. Same contract as docker-compose
  # (where ProcessBuilder env inheritance does the forwarding for free).
  QOD_S3_ENDPOINT:    {{ .Values.s3.endpoint  | quote }}
  QOD_S3_REGION:      {{ .Values.s3.region    | quote }}
  QOD_S3_URL_STYLE:   {{ .Values.s3.urlStyle  | quote }}
  QOD_S3_USE_SSL:     {{ .Values.s3.useSsl    | quote }}
  {{- end }}