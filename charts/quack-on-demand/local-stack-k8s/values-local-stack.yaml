# Helm values for the kind-based local stack rig.
# Used by `run-local-stack-k8s.sh`; not intended for production deploys.

image:
  repository: quack-on-demand
  tag:        local
  pullPolicy: Never

postgres:
  host:              postgres
  existingSecret:    postgres
  existingSecretKey: POSTGRES_PASSWORD

admin:
  password: admin

flightsql:
  tls:
    enabled: true

quackNode:
  image: starlakeai/quack-on-demand-node:local

storage:
  dataPath: s3://qod-ducklake/qod-test

s3:
  endpoint:  http://seaweedfs:8333
  region:    us-east-1
  urlStyle:  path
  useSsl:    false
  accessKey: quack
  secretKey: quackquack

# Layer Keycloak (the kind-internal one provisioned by keycloak.yaml) into
# the AuthenticationService chain. Basic admin/admin still works -- this
# just adds the ROPC path so bearer-token clients can authenticate too.
auth:
  keycloak:
    enabled:      true
    # KC_HTTP_RELATIVE_PATH=/auth in keycloak.yaml means every URL the
    # manager composes (`${baseUrl}/realms/${realm}/...`) needs the
    # /auth path baked into the base.
    baseUrl:      http://keycloak:8080/auth
    realm:        qod
    clientId:     qod-flightsql
    clientSecret: qod-flightsql-secret