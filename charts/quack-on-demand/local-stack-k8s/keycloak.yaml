#
# Single-pod Keycloak (dev mode, ephemeral H2 store) for the kind smoke
# rig. Pre-provisioned with the `qod` realm via `start-dev --import-realm`
# pointed at /opt/keycloak/data/import, mounted from a ConfigMap rendered
# by run-local-stack-k8s.sh from keycloak-realm-qod.json. The realm ships
# a single OIDC client (`qod-flightsql`, ROPC enabled, secret
# `qod-flightsql-secret`) and two users:
#
#   admin  / admin   -- mirrors the bootstrap qodstate_user admin so RBAC
#                       resolves to the existing superuser.
#   reader / reader  -- demo non-superuser; gets default-roles-qod only,
#                       can be granted qodstate_role_permission rows via
#                       the admin UI to exercise the PostgresAclValidator.
#
# A hardcoded protocol mapper adds `tenant: "tpch"` to every access token
# so the FlightSQL edge's tenant-claim routing (PROXY_TENANT_CLAIM=tenant
# by default) picks up `tpch` without the client having to send a header.
#
# Master-realm admin is also admin/admin -- the Keycloak admin console
# at http://keycloak:8080/ uses this. Override KEYCLOAK_ADMIN_PASSWORD
# via env if you want something stronger.
#
# Not production-grade: --start-dev, no DB persistence (emptyDir under
# /opt/keycloak/data), single replica, plaintext admin password baked
# into the env, HTTP only.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.5
          args:
            - start-dev
            - --import-realm
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
            # Allow http for the realm + admin endpoints. Without this
            # Keycloak rejects ROPC requests over plain HTTP.
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_PROXY
              value: edge
            # Frontend (browser-facing) URL is the Traefik ingress. The admin
            # UI OIDC SSO flow needs the discovery doc's authorize endpoint to
            # be browser-reachable (localhost:20900), while the manager calls
            # token/jwks in-cluster. KC_HOSTNAME_BACKCHANNEL_DYNAMIC makes
            # backchannel (token/jwks/discovery) use the request host
            # (keycloak:8080) so the manager reaches them, while frontchannel
            # (authorize, issuer) uses this frontend URL.
            - name: KC_HOSTNAME_URL
              value: "http://localhost:20900/auth"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            # Serve every realm + admin endpoint under /auth/, so the
            # Traefik ingress can route /auth -> keycloak without
            # path-rewriting middleware. Manager's
            # QOD_AUTH_KEYCLOAK_BASE_URL needs the same /auth suffix.
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - mountPath: /opt/keycloak/data/import
              name: realm-import
              readOnly: true
            - mountPath: /opt/keycloak/data
              name: data
          readinessProbe:
            httpGet:
              path: /auth/realms/qod/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 40
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080