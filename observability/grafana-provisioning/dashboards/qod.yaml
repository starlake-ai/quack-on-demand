# Auto-load the quack-on-demand dashboard from /var/lib/grafana/dashboards
# (the docker-compose mounts grafana-dashboard.json there). Grafana
# re-reads this path every 10s, so re-saving the JSON file on the host
# refreshes the dashboard live.

apiVersion: 1

providers:
  - name: quack-on-demand
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false